spring.application.name=monitoreo-service
server.port=8083

spring.datasource.url=jdbc:mysql://mysql-geolocation.firewall.local:3306/geolocation_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=geolocation_user
spring.datasource.password=${MYSQL_GEOLOCATION_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://eureka.firewall.local:8761/eureka/}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
