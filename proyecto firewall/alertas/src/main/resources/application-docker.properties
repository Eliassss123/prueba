spring.application.name=firewall-alerta
server.port=8082

spring.datasource.url=jdbc:mysql://mysql-alerts:3306/alerts_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=alerts_user
spring.datasource.password=${MYSQL_ALERTS_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.h2.console.enabled=false

reports.service.url=${REPORTS_SERVICE_URL:http://ms-reportes:8081/api/reportes/enviar}
alerts.sync.reporte.rut=${ALERTS_SYNC_RUT:00000000-0}

eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://eureka:8761/eureka/}
