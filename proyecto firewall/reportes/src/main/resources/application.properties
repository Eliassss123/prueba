spring.application.name=ms-reportes
server.port=8081

eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Configuración de la conexión a MySQL en Docker
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:3306/db_reportes
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate - Crea las tablas si no existen (opcional)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# --- OpenAPI / Swagger UI (SpringDoc) ---
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui
springdoc.swagger-ui.display-request-duration=true
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha
springdoc.writer-with-default-pretty-printer=true
springdoc.show-actuator=false