spring.application.name=firewall-alerta
server.port=${SERVER_PORT:8082}

# Perfil local: H2 en memoria para probar rápido sin MySQL.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:firewall_alerta}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- OpenAPI / Swagger UI (SpringDoc) ---
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui
springdoc.swagger-ui.display-request-duration=true
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha
springdoc.writer-with-default-pretty-printer=true
springdoc.show-actuator=false

# URL completa del POST que crea el reporte (compatible con CreateReporteRequestDTO)
reports.service.url=${REPORTS_SERVICE_URL:http://localhost:8081/api/reportes/enviar}
# RUT utilizado cuando la alerta se replica como reporte automático
alerts.sync.reporte.rut=${ALERTS_SYNC_RUT:00000000-0}

eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
