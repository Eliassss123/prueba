<div class="bg-white rounded-xl shadow-md overflow-hidden">
  <div class="p-4 sm:p-5 border-b border-slate-100">
    <div class="flex items-start gap-3">
      <span class="inline-flex h-10 w-10 items-center justify-center rounded-lg bg-orange-50 text-orange-600">
        <mat-icon>crisis_alert</mat-icon>
      </span>
      <div>
        <h2 class="font-display text-lg font-bold text-slate-900">Mapa de incidentes</h2>
        <p class="text-sm text-slate-600 mt-0.5">Reportes con ubicación en tiempo real</p>
      </div>
    </div>
  </div>
  <div class="p-4 sm:p-5">
    <div class="flex flex-wrap items-center gap-2 mb-3">
      <button type="button" class="fw-btn-secondary text-sm" (click)="refresh()">
        <mat-icon class="!text-base align-middle mr-1">refresh</mat-icon>
        Actualizar
      </button>
      @if (vm.loading()) {
        <mat-spinner diameter="22" class="inline-block"></mat-spinner>
      }
      @if (vm.error()) {
        <span class="text-sm text-red-600">{{ vm.error() }}</span>
      }
      <span class="text-xs text-slate-500 ml-auto">{{ vm.list().length }} reportes</span>
    </div>
    <div #mapHost class="fw-map-host rounded-xl overflow-hidden border border-slate-200 shadow-sm"></div>
  </div>
</div>
