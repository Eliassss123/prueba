<section class="bg-white rounded-xl shadow-md overflow-hidden">
  <div class="p-5 border-b border-slate-100">
    <div class="flex flex-wrap items-start gap-3">
      <span class="inline-flex h-10 w-10 items-center justify-center rounded-lg bg-emerald-50 text-emerald-700">
        <mat-icon>medical_services</mat-icon>
      </span>
      <div class="min-w-0">
        <h2 class="font-display text-lg font-bold text-slate-900">Recursos utiles cercanos</h2>
        <p class="text-sm text-slate-600 mt-0.5">Farmacias y supermercados de ejemplo para referencia visual</p>
      </div>
    </div>
  </div>

  <div class="p-5">
    <div class="flex flex-wrap items-center gap-2 mb-3">
      <button type="button" class="fw-btn-secondary text-sm" (click)="refresh()">
        <mat-icon class="!text-base align-middle mr-1">refresh</mat-icon>
        Reordenar ejemplos
      </button>
      <span class="text-xs text-slate-500 ml-auto">{{ resources().length }} lugares</span>
    </div>

    <div #mapHost class="fw-resource-map rounded-xl overflow-hidden border border-slate-200 shadow-sm"></div>

    <div class="mt-3 flex flex-wrap gap-2 text-xs text-slate-600">
      <span class="inline-flex items-center gap-1">
        <span class="fw-legend-dot bg-emerald-600"></span>
        Farmacias
      </span>
      <span class="inline-flex items-center gap-1">
        <span class="fw-legend-dot bg-amber-500"></span>
        Supermercados
      </span>
    </div>
  </div>
</section>
